<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEA CONTROL - SCIENCE EXCLUSIVE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=Special+Elite&family=Arizonia&display=swap');

        :root {
            --paper-color: #d8b67e;
            --paper-text: #3e2a12;
            --paper-border: #997a4d;
            --input-bg: rgba(255, 255, 255, 0.25);
        }

        body {
            background-color: #121212;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier Prime', monospace;
        }

        .paper-scroll {
            position: relative;
            background-color: var(--paper-color);
            padding: 70px 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            color: var(--paper-text);
            border: 2px solid var(--paper-border);
            box-sizing: border-box;
        }

        .paper-scroll::before, .paper-scroll::after {
            content: '';
            position: absolute;
            left: -2%;
            width: 104%;
            height: 40px;
            background-color: #be9b65;
            border-radius: 20px;
            border: 3px solid var(--paper-border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .paper-scroll::before { top: -20px; }
        .paper-scroll::after { bottom: -20px; }

        .science-header {
            font-size: 3.5em;
            font-family: 'Arizonia', cursive;
            color: #1a1106;
            display: block;
            text-align: center;
            margin-bottom: -10px;
        }

        h2 {
            font-family: 'Special Elite', cursive;
            text-align: center;
            margin-bottom: 25px;
            color: #2a1b0a;
        }

        .form-group { margin-bottom: 18px; width: 100%; }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 0.85em; 
            font-weight: bold; 
            color: #5d401a;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 2px solid var(--paper-border);
            border-radius: 6px;
            color: var(--paper-text);
            font-family: 'Courier Prime', monospace;
            box-sizing: border-box;
        }

        .file-upload-btn {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 2.5px dashed var(--paper-border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #5d401a;
            box-sizing: border-box;
        }

        #boxLinkInput { display: none; }

        .btn-kuno {
            width: 100%;
            padding: 15px;
            background-color: #be9b65;
            color: black;
            border: 3px solid var(--paper-border);
            border-radius: 6px;
            font-family: 'Special Elite', cursive;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 5px 0 #997a4d;
            margin-top: 10px;
        }

        .btn-kuno:active { transform: translateY(3px); box-shadow: 0 2px 0 #997a4d; }

        #uploaderSection { display: none; }
    </style>
</head>
<body>

    <div class="paper-scroll">
        
        <div id="loginSection">
            <span class="science-header">Science</span>
            <h2>TEA CONTROL</h2>
            
            <div class="form-group">
                <label style="text-align: center;">MASUKAN KEY NYA</label>
                <input type="password" id="adminKey" placeholder="••••••••" style="text-align: center;">
            </div>

            <button class="btn-kuno" id="authBtn">BUKA AKSES</button>
        </div>

        <div id="uploaderSection">
            <h2>COSMIC UPLOADER</h2>
            
            <div class="form-group">
                <label>JUDUL OBJEK</label>
                <input type="text" id="judul" placeholder="...">
            </div>

            <div class="form-group">
                <label>KATEGORI</label>
                <select id="kategori">
                    <option>Planet</option>
                    <option>Galaksi</option>
                    <option>Bintang</option>
                    <option>Misteri</option>
                    <option>Teori</option>
                </select>
            </div>

            <div class="form-group">
                <label>METODE GAMBAR</label>
                <select id="methodSelect" onchange="toggleView()">
                    <option value="galeri">GALERI (ImgBB)</option>
                    <option value="link">LINK LANGSUNG</option>
                </select>
            </div>

            <div class="form-group">
                <label id="imgLabel">PILIH DARI GALERI</label>
                <div id="boxGaleri" class="file-upload-btn" onclick="document.getElementById('fileInput').click()">
                    Klik untuk lampirkan gambar
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <input type="text" id="boxLinkInput" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>PENJELASAN</label>
                <textarea id="deskripsi" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>LINK ARTIKEL</label>
                <input type="text" id="artikel" placeholder="Wikipedia/NASA Link...">
            </div>

            <button class="btn-kuno" onclick="terbitkanData()">TERBITKAN DATA</button>
        </div>

    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { 
            databaseURL: "https://data-base-3d74b-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const keyBenar = "sciencegantengbanget";

        document.getElementById('authBtn').addEventListener('click', function() {
            const input = document.getElementById('adminKey').value;
            if (input === keyBenar) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploaderSection').style.display = 'block';
            } else {
                alert("Kunci Salah!");
                document.getElementById('adminKey').value = "";
            }
        });

        function toggleView() {
            const method = document.getElementById('methodSelect').value;
            if (method === 'link') {
                document.getElementById('boxGaleri').style.display = 'none';
                document.getElementById('boxLinkInput').style.display = 'block';
                document.getElementById('imgLabel').innerText = 'URL GAMBAR';
            } else {
                document.getElementById('boxGaleri').style.display = 'block';
                document.getElementById('boxLinkInput').style.display = 'none';
                document.getElementById('imgLabel').innerText = 'PILIH DARI GALERI';
            }
        }

        // FUNGSI TELEPORT
        function terbitkanData() {
            const data = {
                judul: document.getElementById('judul').value,
                kategori: document.getElementById('kategori').value,
                gambar: document.getElementById('boxLinkInput').value || "https://via.placeholder.com/400x200?text=Cosmic+Object",
                deskripsi: document.getElementById('deskripsi').value,
                artikel: document.getElementById('artikel').value
            };

            if(!data.judul || !data.deskripsi) return alert("Isi semua dulu!");

            // KIRIM & TELEPORT (Nama file tujuan sudah disesuaikan)
            db.ref('cosmic_data').push(data).then(() => {
                window.location.href = "COSMIC-DATA-Galaxy-System.html"; 
            }).catch((e) => alert("Gagal: " + e.message));
        }
    </script>
</body>
</html>
